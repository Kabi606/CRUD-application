<!DOCTYPE html>
<html>
<head>
  <title>API CRUD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 bg-light">

<div class="container">

<h2 class="text-center mb-4">Course Manager</h2>

<!-- FORM -->
<div class="card p-4 mb-4 shadow">
  <input type="hidden" id="id">

  <input class="form-control mb-2" placeholder="Teacher Name" id="teacher">
  <input class="form-control mb-2" placeholder="Course Name" id="course">
  <input class="form-control mb-2" placeholder="Duration" id="duration">
  <input class="form-control mb-3" placeholder="Seat" id="seat">

  <button class="btn btn-primary w-100" onclick="saveData()">Save</button>
</div>

<!-- TABLE -->
<table class="table table-bordered text-center table-striped">
<thead class="table-dark">
<tr>
<th>ID</th>
<th>Teacher</th>
<th>Course</th>
<th>Duration</th>
<th>Seat</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

const API = "http://127.0.0.1:8000";

/* ---------------- FETCH ALL ---------------- */
function loadData(){
fetch(API+"/userinfo/")
.then(res=>res.json())
.then(data=>{
  let rows="";
  data.forEach(d=>{
    rows+=`
    <tr>
      <td>${d.id}</td>
      <td>${d.teacher_name}</td>
      <td>${d.course_name}</td>
      <td>${d.course_duration}</td>
      <td>${d.seat}</td>
      <td>
        <button class="btn btn-sm btn-warning" onclick="editData(${d.id})">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteData(${d.id})">Delete</button>
      </td>
    </tr>
    `;
  });
  document.getElementById("tbody").innerHTML=rows;
});
}

loadData();


/* ---------------- SAVE OR UPDATE ---------------- */
function saveData(){

let id=document.getElementById("id").value;

let data={
  id:id,
  teacher_name:teacher.value,
  course_name:course.value,
  course_duration:duration.value,
  seat:seat.value
};

fetch(API+"/usercreate/",{
 method:id?"PUT":"POST",
 headers:{
   "Content-Type":"application/json"
 },
 body:JSON.stringify(data)
})
.then(res=>res.json())
.then(res=>{
 alert(res.msg);
 loadData();
 clearForm();
});
}


/* ---------------- EDIT ---------------- */
function editData(id){

fetch(API+"/userinfo/"+id)
.then(res=>res.json())
.then(d=>{
  document.getElementById("id").value=d.id;
  teacher.value=d.teacher_name;
  course.value=d.course_name;
  duration.value=d.course_duration;
  seat.value=d.seat;
});

}


/* ---------------- DELETE ---------------- */
function deleteData(id){

if(!confirm("Are you sure you want to delete this record?")) return;

fetch(API+"/userinfo/"+id,{
  method:"DELETE"
})
.then(res=>res.json())
.then(res=>{
  alert(res.msg);
  loadData();
});
}


/* ---------------- CLEAR FORM ---------------- */
function clearForm(){
document.getElementById("id").value="";
teacher.value="";
course.value="";
duration.value="";
seat.value="";
}

</script>

</body>
</html>
